# Validates the Next.js companion explorer under its public GitHub Pages base path.
# Deployment is owned by the sibling Pages repository peterponyu/scccvgben-next,
# so this source repository does not need a cross-repository PAT or deploy token.

name: Validate Next.js companion webapp

on:
  push:
    branches:
      - main
    paths:
      - 'webapp/**'
      - 'site/data/**'
      - 'site/static/**'
      - 'data/benchmark_manifest.csv'
      - 'scripts/build_site_data.py'
      - 'scripts/build_supplementary_table.py'
      - 'scripts/audit_submission_ready.py'
  pull_request:
    paths:
      - 'webapp/**'
      - 'site/data/**'
      - 'site/static/**'
      - 'data/benchmark_manifest.csv'
      - 'scripts/build_site_data.py'
      - 'scripts/build_supplementary_table.py'
      - 'scripts/audit_submission_ready.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-webapp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Lint
        working-directory: webapp
        run: npm run lint

      - name: Build static export with public base path
        working-directory: webapp
        env:
          NEXT_PUBLIC_BASE_PATH: /scccvgben-next
        run: npm run build
