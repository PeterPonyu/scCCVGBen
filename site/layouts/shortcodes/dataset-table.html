{{/*
  dataset-table.html shortcode — renders the full filterable dataset table.
  Data source: site/data/datasets.json (generated by scripts/build_datasets_json.py).
  Uses DataTables.js from CDN for client-side sort + filter.
*/}}

<link rel="stylesheet"
      href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

<div class="dataset-filters">
  <label>Modality:
    <select id="dt-filter-modality">
      <option value="">All</option>
      <option value="scRNA">scRNA</option>
      <option value="scATAC">scATAC</option>
    </select>
  </label>
  <label>Category:
    <select id="dt-filter-category">
      <option value="">All</option>
    </select>
  </label>
  <label>Tissue:
    <select id="dt-filter-tissue">
      <option value="">All</option>
    </select>
  </label>
</div>

<table id="dataset-table" class="display compact" style="width:100%">
  <thead>
    <tr>
      <th>Key</th>
      <th>GSE</th>
      <th>Modality</th>
      <th>Tissue</th>
      <th>Species</th>
      <th>Category</th>
      <th>Cells</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody id="dataset-table-body">
    <!-- populated by JavaScript below -->
  </tbody>
</table>

<style>
.dataset-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem 0.85rem;
  align-items: center;
  margin: 0.75rem 0 0.8rem;
  color: var(--scc-muted);
  font-size: 0.86rem;
}
.dataset-filters label {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  margin: 0;
}
.dataset-filters select,
.dataTables_wrapper select,
.dataTables_wrapper input[type="search"] {
  background: var(--scc-surface);
  color: var(--scc-text);
  border: 1px solid var(--scc-border);
  border-radius: 4px;
  padding: 0.18rem 0.45rem;
  font: inherit;
}
#dataset-table {
  display: table;
  font-size: 0.78rem;
  line-height: 1.32;
}
#dataset-table th,
#dataset-table td {
  border-color: var(--scc-border-soft);
  padding: 0.32rem 0.44rem;
  vertical-align: top;
}
#dataset-table thead th {
  background: var(--scc-panel);
  color: var(--scc-text);
}
#dataset-table tbody tr,
table.dataTable.display tbody tr.odd,
table.dataTable.display tbody tr.even {
  background: var(--scc-surface);
  color: var(--scc-text);
}
table.dataTable.display tbody tr.odd > .sorting_1,
table.dataTable.order-column.stripe tbody tr.odd > .sorting_1,
table.dataTable.display tbody tr.even > .sorting_1,
table.dataTable.order-column.stripe tbody tr.even > .sorting_1 {
  background: color-mix(in srgb, var(--scc-panel) 54%, transparent);
}
#dataset-table .dataset-key {
  color: var(--scc-text);
  font-size: 0.74rem;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  white-space: normal;
  word-break: break-word;
}
#dataset-table td:nth-child(1) {
  max-width: 13rem;
}
#dataset-table td:nth-child(8) {
  max-width: 21rem;
}
.dataTables_wrapper {
  overflow-x: clip;
}
.dataTables_wrapper .dataTables_length,
.dataTables_wrapper .dataTables_filter,
.dataTables_wrapper .dataTables_info,
.dataTables_wrapper .dataTables_paginate {
  color: var(--scc-muted);
  font-size: 0.82rem;
}
.dataTables_wrapper .dataTables_paginate .paginate_button {
  border-radius: 4px;
  padding: 0.2rem 0.5rem;
}
</style>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
        crossorigin="anonymous"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script>
(function() {
  const GEO_BASE = "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=";

  fetch({{ "datasets.json" | absURL }})
    .then(r => r.json())
    .then(data => {
      // Populate filter dropdowns
      const categories = [...new Set(data.map(d => d.category).filter(Boolean))].sort();
      const tissues    = [...new Set(data.map(d => d.tissue).filter(Boolean))].sort();
      const catSel  = document.getElementById("dt-filter-category");
      const tissSel = document.getElementById("dt-filter-tissue");
      categories.forEach(c => { const o = document.createElement("option"); o.value = c; o.text = c; catSel.appendChild(o); });
      tissues.forEach(t => { const o = document.createElement("option"); o.value = t; o.text = t; tissSel.appendChild(o); });

      // Build table rows (safe DOM construction — no innerHTML with user data)
      const tbody = document.getElementById("dataset-table-body");
      data.forEach(d => {
        const tr = document.createElement("tr");

        // filename_key: link to per-dataset detail page
        const tdKey = document.createElement("td");
        const keyLink = document.createElement("a");
        keyLink.className = "dt-key-link dataset-key";
        const slug = String(d.filename_key || "").replace(/[^A-Za-z0-9_\-]+/g, "_").replace(/^_|_$/g, "");
        keyLink.href = {{ "datasets/" | absURL }} + slug + "/";
        keyLink.textContent = d.filename_key || "";
        tdKey.appendChild(keyLink);
        tr.appendChild(tdKey);

        // GSE as hyperlink
        const tdGse = document.createElement("td");
        if (d.GSE) {
          const a = document.createElement("a");
          a.href = GEO_BASE + encodeURIComponent(d.GSE);
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = d.GSE;
          tdGse.appendChild(a);
        } else {
          tdGse.textContent = "—";
        }
        tr.appendChild(tdGse);

        // Remaining plain-text columns
        const plainCols = ["modality", "tissue", "species", "category"];
        plainCols.forEach(k => {
          const td = document.createElement("td");
          td.textContent = (d[k] === undefined || d[k] === null) ? "" : String(d[k]);
          tr.appendChild(td);
        });

        // cell_count right-aligned
        const tdCount = document.createElement("td");
        tdCount.style.textAlign = "right";
        tdCount.textContent = d.cell_count != null ? Number(d.cell_count).toLocaleString() : "";
        tr.appendChild(tdCount);

        // description
        const tdDesc = document.createElement("td");
        tdDesc.textContent = (d.description === undefined || d.description === null) ? "" : String(d.description);
        tr.appendChild(tdDesc);

        tbody.appendChild(tr);
      });

      // Initialize DataTable
      const table = $("#dataset-table").DataTable({
        pageLength: 25,
        autoWidth: false,
        deferRender: true,
        order: [[6, "desc"]],
        columnDefs: [
          { orderable: false, targets: [7] },
          { width: "13rem", targets: [0] },
          { width: "21rem", targets: [7] },
        ],
      });

      // Wire up external filters
      document.getElementById("dt-filter-modality").addEventListener("change", function() {
        table.column(2).search(this.value).draw();
      });
      document.getElementById("dt-filter-category").addEventListener("change", function() {
        table.column(5).search(this.value).draw();
      });
      document.getElementById("dt-filter-tissue").addEventListener("change", function() {
        table.column(3).search(this.value).draw();
      });
    })
    .catch(err => {
      document.getElementById("dataset-table-body").innerHTML =
        `<tr><td colspan="8">Failed to load datasets.json: ${err}</td></tr>`;
    });
})();
</script>
